        catalog_item_images: 'Изображения продуктов'
        service: 'Услуга'
        services: 'Услуги'
        service_group: 'Группа услуг'
        service_groups: 'Группы услуг'
        feedback_from_map: 'Отзыв с карты'
        feedback_from_maps: 'Отзывы с карт'
