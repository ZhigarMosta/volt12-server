# Русские названия ресурсов админки.
# Sylius строит заголовки страниц по шаблонам:
#   app.ui.<plural>   — H1 списка, хлебные крошки, <title>
#   app.ui.<singular> — заголовок редактирования («Редактировать …») и подзаголовок из routes.yaml
# Ключи должны существовать для обеих форм каждого ресурса, иначе на странице виден сырой путь ключа.
