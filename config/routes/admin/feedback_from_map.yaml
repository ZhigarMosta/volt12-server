app_admin_feedback_from_map_create:
  path: /admin/feedback_from_map/new
  methods: [GET, POST]
  defaults:
    _controller: app.controller.feedback_from_map:createAction
    _sylius:
      section: admin
      template: admin/crud/create.html.twig
      permission: true

app_admin_feedback_from_map_update:
  path: /admin/feedback_from_map/{id}/edit
  methods: [GET, PUT, PATCH]
  requirements:
    id: \d+
  defaults:
    _controller: app.controller.feedback_from_map:updateAction
    _sylius:
      section: admin
      template: admin/crud/update.html.twig
      permission: true

app_admin_feedback_from_map_delete:
  path: /admin/feedback_from_map/{id}
  methods: [DELETE]
  requirements:
    id: \d+
  defaults:
    _controller: app.controller.feedback_from_map:deleteAction
    _sylius:
      section: admin
      permission: true

app_admin_feedback_from_map:
  resource: |
    alias: app.feedback_from_map
    section: admin
    templates: "admin/crud"
    grid: app_admin_feedback_from_map
    path: /admin/feedback_from_map
    permission: true
    except: [show]
  type: sylius.resource
