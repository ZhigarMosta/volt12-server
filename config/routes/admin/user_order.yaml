app_admin_user_order_update:
  path: /admin/user_order/{id}/edit
  methods: [GET, PUT, PATCH]
  requirements:
    id: \d+
  defaults:
    _controller: app.controller.user_order:updateAction
    _sylius:
      section: admin
      template: admin/crud/update.html.twig
      permission: true

app_admin_user_order_delete:
  path: /admin/user_order/{id}
  methods: [DELETE]
  requirements:
    id: \d+
  defaults:
    _controller: app.controller.user_order:deleteAction
    _sylius:
      section: admin
      permission: true

app_admin_user_order:
  resource: |
    alias: app.user_order
    section: admin
    templates: "admin/crud"
    grid: app_admin_user_order
    path: /admin/user_order
    permission: true
    except: [show, create]
  type: sylius.resource
