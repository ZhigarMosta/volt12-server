sylius_grid:
    grids:
        app_admin_catalog_item:
            driver:
                name: doctrine/orm
                options:
                    class: App\Entity\CatalogItem
            sorting:
                position: asc
            filters:
                name:
                    type: string
                    label: Название
                slug:
                    type: string
                    label: Название
                price:
                    label: Цена
                    type: numeric_range
                    form_options:
                        label: Цена
                catalog:
                    type: entity
                    label: Каталог
                    options:
                        fields: [ catalog ]
                    form_options:
                        class: App\Entity\Catalog
                        choice_label: name
                product_code:
                    label: "Код продукта"
                    type: select
                    form_options:
                        choices:
                            'Мастер вольт 12': 'volt12'
                            'Пандора': 'pandora'
                            'Любой': 'any'
                position:
                    label: Позиция
                    type: numeric_range
                    form_options:
                        label: Позиция
                is_new:
                    label: Новое?
                    type: boolean
                is_popular:
                    label: Популярное?
                    type: boolean
                is_published:
                    label: Опубликован?
                    type: boolean
            fields:
                name:
                    type: string
                    label: Название
                    sortable: ~
                slug:
                    type: string
                    label: Slug
                    sortable: ~
                price:
                    type: twig
                    label: Цена
                    path: .
                    options:
                        template: 'admin/field/money.html.twig'
                catalog:
                    type: twig
                    label: Каталог
                    path: .
                    sortable: catalog.name
                    options:
                        template: 'admin/grid/field/catalog.html.twig'
                position:
                    type: string
                    label: Позиция
                    sortable: ~
                is_published:
                    type: twig
                    label: Опубликован?
                    path: .
                    options:
                        template: 'admin/grid/field/isPublished.html.twig'
            actions:
                main:
                    create: { type: create }
                item:
                    update: { type: update }
                    delete: { type: delete }

        app_admin_catalog:
            driver:
                name: doctrine/orm
                options:
                    class: App\Entity\Catalog
            filters:
                name:
                    type: string
                    label: Название
                product_code:
                    type: string
                    label: Код продукта
            fields:
                name:
                    type: string
                    label: Название
                    sortable: ~
                product_code:
                    type: string
                    label: Код продукта
                    sortable: ~
            
            actions:
                main:
                    create: { type: create }
                item:
                    update: { type: update }
                    delete: { type: delete }
                    show_catalog_items:
                        type: default
                        label: Товары
                        template: "admin/grid/action/show_catalog_items.html.twig"
                        options:
                            route_to_item: app_admin_catalog_item_index


        app_admin_catalog_characteristic:
            driver:
                name: doctrine/orm
                options:
                    class: App\Entity\CatalogCharacteristic
            filters:
                name:
                    type: string
                    label: Название
                catalog:
                    type: entity
                    label: Каталог
                    options:
                        fields: [ catalog ]
                    form_options:
                        class: App\Entity\Catalog
                        choice_label: name
                catalogGroup:
                    type: entity
                    label: Группа
                    options:
                        fields: [ catalogGroup ]
                    form_options:
                        class: App\Entity\CatalogGroup
                        choice_label: name
                product_code:
                    type: string
                    label: Код продукта
            fields:
                name:
                    type: string
                    label: Название
                    sortable: ~
                catalog:
                    type: twig
                    label: Каталог
                    path: .
                    sortable: catalog.name
                    options:
                        template: 'admin/grid/field/catalog.html.twig'
                catalogGroup:
                    type: twig
                    label: Группа
                    path: .
                    sortable: catalog_group.name
                    options:
                        template: 'admin/grid/field/catalogGroup.html.twig'
                product_code:
                    type: string
                    label: Код продукта
                    sortable: ~
            actions:
                main:
                    create: { type: create }
                item:
                    update: { type: update }
                    delete: { type: delete }

        app_admin_catalog_item_characteristic:
            driver:
                name: doctrine/orm
                options:
                    class: App\Entity\CatalogItemCharacteristic
            filters:
                catalog:
                    type: entity
                    label: Продукт
                    options:
                        fields: [ catalog_item ]
                    form_options:
                        class: App\Entity\CatalogItem
                        choice_label: name
                catalog_characteristic:
                    type: entity
                    label: Характеристика продукта
                    options:
                        fields: [ catalog_characteristic ]
                    form_options:
                        class: App\Entity\CatalogCharacteristic
                        choice_label: name
            fields:
                catalog:
                    type: twig
                    label: Продукт
                    path: .
                    sortable: catalog_item.name
                    options:
                        template: 'admin/grid/field/catalogItem.html.twig'
                catalog_characteristic:
                    type: twig
                    label: Характеристика каталога
                    path: .
                    sortable: catalog_characteristic.name
                    options:
                        template: 'admin/grid/field/catalogCharacteristic.html.twig'
            actions:
                main:
                    create: { type: create }
                item:
                    update: { type: update }
                    delete: { type: delete }
        
        app_admin_catalog_group:
            driver:
                name: doctrine/orm
                options:
                    class: App\Entity\CatalogGroup
            filters:
                catalog:
                    type: entity
                    label: Каталог
                    options:
                        fields: [ catalog ]
                    form_options:
                        class: App\Entity\Catalog
                        choice_label: name
            fields:
                name:
                    type: string
                    label: Название
                    sortable: ~
                catalog:
                    type: twig
                    label: Каталог
                    path: .
                    sortable: catalog.name
                    options:
                        template: 'admin/grid/field/catalog.html.twig'
            actions:
                main:
                    create: { type: create }
                item:
                    update: { type: update }
                    delete: { type: delete }

        app_admin_catalog_item_image:
            driver:
                name: doctrine/orm
                options:
                    class: App\Entity\CatalogItemImage
            sorting:
                position: asc
            filters:
                alt:
                    type: string
                    label: Название
                title:
                    type: string
                    label: Название
                position:
                    label: Позиция
                    type: numeric_range
                catalog_item:
                    type: entity
                    label: Продукт
                    options:
                        fields: [ catalogItem ]
                    form_options:
                        class: App\Entity\CatalogItem
                        choice_label: name
            fields:
                image:
                    type: twig
                    label: Изобр.
                    path: .
                    sortable: ~
                    options:
                        template: "admin/grid/field/image.html.twig"
                catalog_item:
                    type: twig
                    label: Продукт
                    path: .
                    sortable: catalog_item.name
                    options:
                        template: 'admin/grid/field/catalogItem.html.twig'
                alt:
                    type: string
                    label: Alt
                    sortable: ~
                title:
                    type: string
                    label: Title
                    sortable: ~
                position:
                    type: string
                    label: Позиция
                    sortable: ~
            actions:
                main:
                    create: { type: create }
                item:
                    update: { type: update }
                    delete: { type: delete }
                    
    templates:
        filter:
            numeric_range: "admin/grid/filter/numeric_range.html.twig"
