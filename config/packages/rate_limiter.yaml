framework:
    rate_limiter:
        # Форма обратной связи — 10 отправок в час с одного IP
        feedback_submit:
            policy: 'sliding_window'
            limit: 10
            interval: '1 hour'

        # Глобальный лимит исходящих писем — 400 в сутки (запас от лимита Яндекса 500/день)
        outgoing_email:
            policy: 'sliding_window'
            limit: 400
            interval: '1 day'

        # Письма верификации — 50 в час на пользователя
        email_verification:
            policy: 'sliding_window'
            limit: 50
            interval: '1 hour'

        # Сброс пароля — 50 запросов в час с одного IP
        password_reset:
            policy: 'sliding_window'
            limit: 50
            interval: '1 hour'

        # Подтверждение email кодом — защита от подбора 6-значного кода
        email_verify_attempt:
            policy: 'sliding_window'
            limit: 20
            interval: '1 hour'

        # Запрос кода смены пароля — 10 запросов в час на пользователя
        password_change_request:
            policy: 'sliding_window'
            limit: 10
            interval: '1 hour'

        # Подтверждение смены пароля кодом — защита от подбора 6-значного кода
        password_change_attempt:
            policy: 'sliding_window'
            limit: 20
            interval: '1 hour'

        # Сброс пароля — предел писем на один email-адрес получателя
        # (защита от email-бомбинга жертвы, отдельно от лимита по IP отправителя)
        password_reset_target:
            policy: 'sliding_window'
            limit: 5
            interval: '1 hour'

        # Регистрация — ограничение создания аккаунтов с одного IP
        register:
            policy: 'sliding_window'
            limit: 10
            interval: '1 hour'

        # Вход — защита от брутфорса пароля с одного IP
        login:
            policy: 'sliding_window'
            limit: 30
            interval: '1 hour'

        # Вход — защита конкретного аккаунта от подбора пароля с разных IP
        login_target:
            policy: 'sliding_window'
            limit: 10
            interval: '1 hour'

        # Применение кода сброса пароля — защита от подбора 4-значного кода
        password_reset_attempt:
            policy: 'sliding_window'
            limit: 20
            interval: '1 hour'
