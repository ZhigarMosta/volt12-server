twig:
    paths: ['%kernel.project_dir%/templates']
    debug: '%kernel.debug%'
    strict_variables: '%kernel.debug%'
    globals:
        # Адрес витрины (из FRONTEND_URL) — для прямых ссылок на сайт из админки и документации
        frontend_url: '%frontend_url%'

services:
    _defaults:
        public: false
        autowire: true
        autoconfigure: true

    Twig\Extra\Intl\IntlExtension: ~
    Twig\Extra\String\StringExtension: ~

when@test_cached:
    twig:
        strict_variables: true
