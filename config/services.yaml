parameters:
    catalog_items_directory: '%kernel.project_dir%/public/uploads/items'
    locale: ru
    mailer_from: '%env(MAILER_FROM)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        
    App\Twig\AppExtension:
        tags: ['twig.extension']
    
    App\Service\Admin\CrudService:
        autowire: true
        
    App\Service\Volt12\CatalogService:
        autowire: true
    
    App\Service\Volt12\CatalogItemService:
        autowire: true
        
    App\Service\Volt12\CatalogCharacteristicService:
        autowire: true
        
    App\Service\Volt12\CatalogGroupService:
        autowire: true
        
    App\Service\Volt12\FeedbackFromMapService:
        autowire: true
        
    App\Controller\Admin\CatalogItemCharacteristicController:
        tags: [ 'controller.service_arguments' ]
        arguments:
            $catalogItemService: '@App\Service\Volt12\CatalogItemService'
            $catalogCharacteristicService: '@App\Service\Volt12\CatalogCharacteristicService'
            $crudService: '@App\Service\Admin\CrudService'
            $catalogGroupService: '@App\Service\Volt12\CatalogGroupService'
            $catalogService: '@App\Service\Volt12\CatalogService'
    
    App\Controller\Volt12\CatalogController:
        tags: [ 'controller.service_arguments' ]
        arguments:
            $catalogService: '@App\Service\Volt12\CatalogService'

    App\Controller\Volt12\CatalogItemController:
        tags: [ 'controller.service_arguments' ]
        arguments:
            $catalogItemService: '@App\Service\Volt12\CatalogItemService'
    
    App\Controller\Volt12\FeedbackFromMapController:
        tags: [ 'controller.service_arguments' ]
        arguments:
            $feedbackFromMapService: '@App\Service\Volt12\FeedbackFromMapService'
    
    App\Controller\Volt12\CatalogCharacteristicController:
        tags: [ 'controller.service_arguments' ]
        arguments:
            $catalogCharacteristicService: '@App\Service\Volt12\CatalogCharacteristicService'
    
    App\Menu\AdminMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addAdminMenuItems }
    
    App\Menu\CatalogItemMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addToMain }

    App\Menu\CatalogMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addToMain }
    
    App\Menu\FeedbackFromMapListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addToMain }

    App\Menu\CatalogCharacteristicMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addToMain }

    App\Menu\CatalogItemCharacteristicMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addToMain }

    App\Menu\CatalogGroupMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addToMain }

    App\Menu\CatalogItemImageMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addToMain }

    App\EventListener\CatalogItemImageListener:
        tags:
            - { name: doctrine.orm.entity_listener }

    App\EventListener\CatalogImageListener:
        tags:
            - { name: doctrine.orm.entity_listener }

    App\EventListener\ServiceGroupImageListener:
        tags:
            - { name: doctrine.orm.entity_listener }

    App\EventListener\ServiceImageListener:
        tags:
            - { name: doctrine.orm.entity_listener }

    App\EventListener\CatalogDeletionListener:
        tags:
            - {
                name: kernel.event_listener,
                event: app.catalog.pre_delete,
                method: onPreDelete
            }

    App\EventListener\CatalogGroupDeletionListener:
        tags:
            - {
                name: kernel.event_listener,
                event: app.catalog_group.pre_delete,
                method: onPreDelete
            }

    App\EventListener\CatalogItemDeletionListener:
        tags:
            - {
                name: kernel.event_listener,
                event: app.catalog_item.pre_delete,
                method: onPreDelete
            }
    
    App\EventListener\CatalogItemResourceListener:
        tags:
            - { name: kernel.event_listener, event: app.catalog_item.pre_create, method: onPreCreate }
            - { name: kernel.event_listener, event: app.catalog_item.pre_update, method: onPreUpdate }
    
    App\EventListener\CatalogResourceListener:
        tags:
            - { name: kernel.event_listener, event: app.catalog.pre_create, method: onPreCreate }
            - { name: kernel.event_listener, event: app.catalog.pre_update, method: onPreUpdate }
    
    App\EventListener\FeedbackFromMapListener:
        tags:
            - { name: kernel.event_listener, event: app.feedback_from_map.pre_create, method: onPreCreate }
            - { name: kernel.event_listener, event: app.feedback_from_map.pre_update, method: onPreUpdate }

    App\EventListener\UserResourceListener:
        tags:
            - { name: kernel.event_listener, event: app.user.pre_create, method: onPreCreate }
            - { name: kernel.event_listener, event: app.user.pre_update, method: onPreUpdate }
     
    App\EventListener\CatalogItemImageResourceListener:
        tags:
            - { name: kernel.event_listener, event: app.catalog_item_image.pre_create, method: onPreCreate }
            - { name: kernel.event_listener, event: app.catalog_item_image.pre_update, method: onPreUpdate }
    
    App\EventListener\CatalogItemCharacteristicListener:
        tags:
            - { name: kernel.event_listener, event: app.catalog_item_characteristic.pre_create, method: onPreCreate }
            - { name: kernel.event_listener, event: app.catalog_item_characteristic.pre_update, method: onPreUpdate }
    
    App\EventListener\CatalogCharacteristicDeletionListener:
        tags:
            - {
                name: kernel.event_listener,
                event: app.catalog_characteristic.pre_delete,
                method: onPreDelete
            }

    App\EventListener\CatalogCharacteristicResourceListener:
        tags:
            - { name: kernel.event_listener, event: app.catalog_characteristic.pre_create, method: onPreCreate }
            - { name: kernel.event_listener, event: app.catalog_characteristic.pre_update, method: onPreUpdate }

    App\EventListener\CatalogGroupResourceListener:
        tags:
            - { name: kernel.event_listener, event: app.catalog_group.pre_create, method: onPreCreate }
            - { name: kernel.event_listener, event: app.catalog_group.pre_update, method: onPreUpdate }

    App\Menu\ServiceGroupMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addToMain }

    App\Menu\ServiceMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addToMain }

    App\EventListener\ServiceGroupDeletionListener:
        tags:
            - {
                name: kernel.event_listener,
                event: app.service_group.pre_delete,
                method: onPreDelete
            }

    App\EventListener\ServiceGroupResourceListener:
        tags:
            - { name: kernel.event_listener, event: app.service_group.pre_create, method: onPreCreate }
            - { name: kernel.event_listener, event: app.service_group.pre_update, method: onPreUpdate }

    App\EventListener\ServiceResourceListener:
        tags:
            - { name: kernel.event_listener, event: app.service.pre_create, method: onPreCreate }
            - { name: kernel.event_listener, event: app.service.pre_update, method: onPreUpdate }

    App\Service\Volt12\ServiceGroupService:
        autowire: true

    App\Service\Volt12\ServiceService:
        autowire: true

    App\Controller\Volt12\ServiceController:
        tags: [ 'controller.service_arguments' ]
        arguments:
            $serviceService: '@App\Service\Volt12\ServiceService'
            $serviceRepository: '@App\Repository\ServiceRepository'

    App\Form\Type\ServiceGroupType:
        tags: [ 'form.type' ]
        autowire: true

    App\Form\Type\ServiceType:
        tags: [ 'form.type' ]
        autowire: true

    App\EventListener\UserFromCookieListener:
        tags:
            - { name: kernel.event_listener, event: kernel.request, method: onKernelRequest, priority: 10 }

    App\Service\Volt12\UserService:
        autowire: true

    App\Service\Volt12\FeedbackService:
        autowire: true
        arguments:
            $mailerFrom: '%mailer_from%'

    App\Controller\Volt12\AuthController:
        tags: [ 'controller.service_arguments' ]
        arguments:
            $userService: '@App\Service\Volt12\UserService'

    App\Controller\Volt12\FeedbackController:
        tags: [ 'controller.service_arguments' ]
        arguments:
            $feedbackService: '@App\Service\Volt12\FeedbackService'

    App\Service\Volt12\CartService:
        autowire: true

    App\Service\Volt12\CompareService:
        autowire: true

    App\Service\Volt12\FavoriteService:
        autowire: true

    App\Controller\Volt12\CartController:
        tags: [ 'controller.service_arguments' ]
        arguments:
            $cartService: '@App\Service\Volt12\CartService'
            $catalogItemRepository: '@App\Repository\CatalogItemRepository'

    App\Controller\Volt12\CompareController:
        tags: [ 'controller.service_arguments' ]
        arguments:
            $compareService: '@App\Service\Volt12\CompareService'
            $catalogItemRepository: '@App\Repository\CatalogItemRepository'

    App\Controller\Volt12\FavoriteController:
        tags: [ 'controller.service_arguments' ]
        arguments:
            $favoriteService: '@App\Service\Volt12\FavoriteService'
            $catalogItemRepository: '@App\Repository\CatalogItemRepository'

    App\Service\ImageUploader:
        arguments:
            $targetDirectory: '%catalog_items_directory%'

    App\Form\Type\CatalogItemCharacteristicType:
        tags: [ 'form.type' ]
        autowire: true
        
    App\Form\Type\CatalogCharacteristicType:
        tags: [ 'form.type' ]
        autowire: true

    App\Form\Type\CatalogItemType:
        tags: [ 'form.type' ]
        autowire: true


    App\Form\Type\CatalogImageType:
        tags: [ 'form.type' ]
        autowire: true

    App\Form\Type\UserType:
        tags: [ 'form.type' ]
        autowire: true

    App\Menu\UserMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addToMain }

    App\Form\Type\CartType:
        tags: [ 'form.type' ]
        autowire: true

    App\Form\Type\CompareType:
        tags: [ 'form.type' ]
        autowire: true

    App\Form\Type\FavoriteType:
        tags: [ 'form.type' ]
        autowire: true

    App\Menu\CartMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addToMain }

    App\Menu\CompareMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addToMain }

    App\Menu\FavoriteMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addToMain }

    App\Menu\UserOrderMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addToMain }

    App\Service\Volt12\UserOrderService:
        autowire: true

    App\Controller\Volt12\UserOrderController:
        tags: [ 'controller.service_arguments' ]
        arguments:
            $userOrderService: '@App\Service\Volt12\UserOrderService'
